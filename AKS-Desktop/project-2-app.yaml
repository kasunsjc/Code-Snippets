# ---------------------------------------------------
# 1. Deployment
# ---------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-2-app
  namespace: project-2
  labels:
    app: project-2-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-2-app
  template:
    metadata:
      labels:
        app: project-2-app
    spec:
      containers:
        - name: project-2-app
          image: mcr.microsoft.com/azuredocs/aks-helloworld:v1
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
# ---------------------------------------------------
# 2. Service (ClusterIP)
# ---------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: project-2-app-svc
  namespace: project-2
spec:
  type: ClusterIP
  selector:
    app: project-2-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
# ---------------------------------------------------
# 3. Ingress – AKS App Routing with kasunrajapakse.xyz
# ---------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-2-app-ingress
  namespace: project-2
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    - host: project-2-app.kasunrajapakse.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: project-2-app-svc
                port:
                  number: 80
---
# ---------------------------------------------------
# 4. KEDA ScaledObject – HTTP-based autoscaling (CPU)
# ---------------------------------------------------
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: project-2-app-scaledobject
  namespace: project-2
spec:
  scaleTargetRef:
    name: project-2-app                   # targets the Deployment above
  pollingInterval: 15                      # check metrics every 15s
  cooldownPeriod: 60                       # wait 60s before scaling down
  minReplicaCount: 1                       # minimum pods
  maxReplicaCount: 20                     # maximum pods
  triggers:
    # Scale based on CPU utilisation reported by the metrics server
    - type: cpu
      metricType: Utilization
      metadata:
        value: "50"                        # scale up when avg CPU > 50%
    # Scale based on Memory utilisation
    - type: memory
      metricType: Utilization
      metadata:
        value: "60"                        # scale up when avg memory > 60%
