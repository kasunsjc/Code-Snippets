---
# Cilium Network Policy: DNS-aware egress policy
# Only allow the backend-api to resolve and connect to specific external domains
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backend-api-egress-dns
  namespace: cilium-demo
spec:
  endpointSelector:
    matchLabels:
      app: backend-api
  egress:
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*.microsoft.com"
              - matchPattern: "*.azure.com"
    # Allow HTTPS to matched DNS names
    - toFQDNs:
        - matchPattern: "*.microsoft.com"
        - matchPattern: "*.azure.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Allow in-cluster traffic to database
    - toEndpoints:
        - matchLabels:
            app: database
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
