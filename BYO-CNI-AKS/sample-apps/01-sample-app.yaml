---
# Database tier (simulated with nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: cilium-demo
  labels:
    app: database
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
        tier: database
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - frontend
                        - backend-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: database
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: cilium-demo
  labels:
    app: database
spec:
  selector:
    app: database
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
